name: When I only drink about you

on:
  workflow_run:
    workflows: ["I only smoke when i drink"]
    types:
      - completed
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    name: Build for ${{ matrix.patch_arch }}
    runs-on: ubuntu-latest
    env:
      project_name: "luci-app-oplist"
    strategy:
      fail-fast: false
      matrix:
        include:
          - patch_arch: "x86_64"
            sdk_arch: "x86-64"
            openlist_nickname: "linux-musl-amd64"
          - patch_arch: "aarch64_generic"
            sdk_arch: "rockchip-armv8"
            openlist_nickname: "linux-musl-arm64"
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          path: ${{ env.project_name }}

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          cd ${{ env.project_name }}
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Preparing build environment
        uses: moaeiou/moaeiou/actions/build-env@main

      - name: Prepare SDK
        id: sdk
        uses: moaeiou/moaeiou/actions/prepare-sdk@main
        with:
          sdk_arch: ${{ matrix.sdk_arch }}

      - name: Preparation before compilation
        shell: bash
        run: |
          mv ${{ env.project_name }} ${{ steps.sdk.outputs.sdk_dir }}/package/
          cd ${{ steps.sdk.outputs.sdk_dir }}/package/${{ env.project_name }}/
          if [ "${{ matrix.patch_arch }}" != "x86_64" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi
          cd root/usr/bin/
          rm -f DONOTREMOVE
          wget -O openlist https://github.com/morouter/luci-app-oplist/releases/download/OpenList/openlist-${{ matrix.openlist_nickname }}
          chmod +x ./openlist
          cd ../../etc/openlist
          rm DONOTREMOVE

      - name: Build for OpenWrt
        shell: bash
        run: |
          cd ${{ steps.sdk.outputs.sdk_dir }}
          make package/${{ env.project_name }}/compile V=s -j$(nproc)

      - name: Rename compilation files
        shell: bash
        run: |
          mv ${{ steps.sdk.outputs.sdk_dir }}/bin/packages/*/base/luci-app*.apk $GITHUB_WORKSPACE/luci-app-oplist-${{ steps.get_version.outputs.version }}-${{ matrix.patch_arch }}.apk

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            ${{ steps.sdk.outputs.sdk_dir }}/bin/packages/*/base/*.apk
            ${{ github.workspace }}/*.apk
          body: |
            # 📝 Release Note
            - Fixes and improvements
            # ⚠️ Breaking Changes
            - Back up `/etc/openlist` before upgrading.
            - Delete `/etc/openlist/config.json` and restart OpenList to regenerate the configuration.
            - Keep `/etc/openlist/data.db`, otherwise all OpenList data will be lost.
            - If you encounter any problems, please open an issue.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
